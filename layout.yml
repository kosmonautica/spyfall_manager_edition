# Squib layout definitions for Spyfall: Manager Edition
# Poker card landscape: 88.9mm x 63.5mm -> 1050 x 750 px at 300 dpi

card_background:
  x: 0
  y: 0
  width: 1050
  height: 750

scenario_number_box:
  x: 40
  y: 40
  width: 60
  height: 60
  fill_color: '#c8a882'
  stroke_color: '#c8a882'
  stroke_width: 0
  radius: 4

scenario_name_box:
  x: 110
  y: 40
  width: 900
  height: 60
  fill_color: '#c8a882'
  stroke_color: '#c8a882'
  stroke_width: 0
  radius: 4

scenario_number_text:
  x: 40
  y: 40
  width: 60
  height: 60
  font: 'Courier New 10'
  color: 'black'
  align: 'center'
  valign: 'middle'

scenario_name_text:
  x: 120
  y: 44
  width: 880
  height: 52
  font: 'Courier New Bold 13'
  color: 'black'
  align: 'left'
  valign: 'middle'
  ellipsize: 'autoscale'

role_name_text:
  x: 50
  font: 'Courier New 9'
  color: 'black'
  align: 'left'
  valign: 'middle'

# --- Scenario overview sheet ---

overview_title:
  x: 0
  y: 40
  width: 2480
  height: 140
  font: 'Courier New Bold 28'
  color: 'black'
  align: 'center'
  valign: 'middle'

# --- Back side ---

backside_text:
  x: 125
  y: 225
  width: 800
  height: 300
  font: 'Courier New Bold 14'
  color: '#555555'
  align: 'center'
  valign: 'middle'
  angle: -0.28
